<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini2: AI Study Partner</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Critical for dark mode toggle to work with Tailwind 'dark' class
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <style>
        /* Professional print styles preserved from your original idea */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0; }
            .print-area { box-shadow: none; width: 100%; max-width: 100%; border: none; padding: 0; }
        }

        /* Bold tag styling for AI responses */
        #notesContent b, .prose b {
            font-weight: 800;
            transition: color 0.3s ease;
        }

        .dark #notesContent b, .dark .prose b {
            color: #60a5fa !important;
        }

        /* Smooth theme transitions */
        body {
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Custom Scrollbar for a premium feel */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #334155;
        }
    </style>
  </head>
  <body class="bg-slate-100 dark:bg-slate-900 transition-colors duration-300">
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
        // Tab switching logic must be global if injected in HTML strings from backend
        function showTab(tabName) {
            const views = document.querySelectorAll('.tab-content');
            const buttons = document.querySelectorAll('.tab-controls button');

            views.forEach(v => v.style.display = 'none');
            const targetView = document.getElementById(tabName + '-view');
            if(targetView) targetView.style.display = 'block';

            // Visual feedback for buttons
            buttons.forEach(btn => {
                if(btn.id === 'tab-btn-' + tabName) {
                    btn.classList.add('bg-blue-800', 'text-white');
                    btn.classList.remove('bg-white', 'dark:bg-slate-800', 'text-slate-500');
                } else {
                    btn.classList.remove('bg-blue-800', 'text-white');
                    btn.classList.add('bg-white', 'dark:bg-slate-800', 'text-slate-500');
                }
            });
        }
    </script>
  </body>
</html>
